<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Slide A11y Remediator</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    :root {
      --bg:        #0a0a0a;
      --surface:   #111111;
      --card:      #1a1a1a;
      --card-2:    #222222;
      --border:    rgba(255,255,255,0.08);
      --border-2:  rgba(255,255,255,0.14);
      --text:      #f0f0f0;
      --muted:     #666666;
      --accent:    #e8e8e8;
      --accent-bg: rgba(255,255,255,0.06);
      --error:     #e05252;
      --error-bg:  rgba(224,82,82,0.1);
      --warn:      #c8902a;
      --warn-bg:   rgba(200,144,42,0.1);
      --ok:        #3a9e6e;
      --ok-bg:     rgba(58,158,110,0.1);
      --info:      #888888;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 13px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 3px; }

    /* ── LAYOUT ─────────────────────────────────────────────────── */
    .app { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

    .topbar {
      display: flex; align-items: center; gap: 12px;
      padding: 0 20px; height: 52px; min-height: 52px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      z-index: 10;
    }
    .topbar-logo {
      font-weight: 600; font-size: 13px;
      color: var(--text); letter-spacing: -0.01em;
      white-space: nowrap;
    }
    .topbar-sep { width: 1px; height: 16px; background: var(--border-2); }
    .topbar-filename {
      font-size: 12px; color: var(--muted);
      font-family: ui-monospace, "SF Mono", monospace;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      max-width: 240px;
    }
    .topbar-progress {
      display: flex; align-items: center; gap: 8px;
      margin-left: auto; font-size: 11px; color: var(--muted);
    }
    .progress-bar-wrap { width: 80px; height: 2px; background: var(--border-2); border-radius: 2px; }
    .progress-bar-fill { height: 100%; border-radius: 2px; background: var(--muted); transition: width .3s; }
    .topbar-btn {
      padding: 5px 12px; border-radius: 5px; border: 1px solid var(--border-2);
      background: transparent; color: var(--muted); font-size: 12px; font-family: inherit;
      cursor: pointer; transition: color .12s, border-color .12s, background .12s;
      white-space: nowrap;
    }
    .topbar-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.22); background: var(--card); }
    .topbar-btn.primary {
      background: var(--text); border-color: var(--text); color: #000; font-weight: 500;
    }
    .topbar-btn.primary:hover { opacity: .85; }

    .workspace { display: flex; flex: 1; overflow: hidden; }

    /* ── SLIDE STRIP ──────────────────────────────────────────────── */
    .slide-strip {
      width: 140px; min-width: 140px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      overflow-y: auto; overflow-x: hidden;
      padding: 12px 8px;
      display: flex; flex-direction: column; gap: 8px;
    }
    .slide-thumb {
      position: relative; cursor: pointer; border-radius: 6px;
      border: 2px solid transparent;
      overflow: hidden; background: var(--card);
      transition: border-color .15s;
    }
    .slide-thumb.active   { border-color: rgba(255,255,255,0.5); }
    .slide-thumb:hover:not(.active) { border-color: var(--border-2); }
    .slide-thumb img { width: 100%; display: block; }
    .slide-thumb-num {
      position: absolute; bottom: 4px; left: 4px;
      font-size: 10px; font-family: ui-monospace, "SF Mono", monospace; color: var(--muted);
      background: rgba(0,0,0,.6); padding: 1px 4px; border-radius: 3px;
    }
    .slide-thumb-badge {
      position: absolute; top: 4px; right: 4px;
      background: var(--error); color: #fff;
      font-size: 10px; font-weight: 600;
      min-width: 16px; height: 16px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center; padding: 0 4px;
    }
    .slide-thumb-placeholder {
      width: 100%; aspect-ratio: 4/3;
      background: var(--card-2);
      display: flex; align-items: center; justify-content: center;
      color: var(--muted); font-size: 10px;
    }

    /* ── SLIDE PREVIEW ────────────────────────────────────────────── */
    .slide-preview {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 24px; background: var(--bg); overflow: hidden;
    }
    .slide-preview img {
      max-width: 100%; max-height: 100%;
      object-fit: contain; border-radius: 4px;
      box-shadow: 0 4px 32px rgba(0,0,0,.7);
    }
    .slide-preview-label {
      margin-top: 10px; font-size: 11px; color: var(--muted);
      font-family: ui-monospace, "SF Mono", monospace;
    }
    .preview-loading {
      display: flex; flex-direction: column; align-items: center; gap: 12px;
      color: var(--muted); font-size: 12px;
    }
    .spinner {
      width: 20px; height: 20px;
      border: 1.5px solid var(--border-2);
      border-top-color: var(--muted);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── ISSUES PANEL ────────────────────────────────────────────── */
    .issues-panel {
      width: 340px; min-width: 340px;
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    .issues-tabs {
      display: flex; border-bottom: 1px solid var(--border);
    }
    .issues-tab {
      flex: 1; padding: 10px 8px; text-align: center;
      font-size: 11px; font-weight: 500; cursor: pointer;
      color: var(--muted); border-bottom: 2px solid transparent;
      transition: color .15s; letter-spacing: .03em; text-transform: uppercase;
      margin-bottom: -1px;
    }
    .issues-tab.active { color: var(--text); border-bottom-color: rgba(255,255,255,0.5); }
    .issues-list {
      flex: 1; overflow-y: auto; padding: 12px;
      display: flex; flex-direction: column; gap: 8px;
    }
    .issues-empty {
      display: flex; flex-direction: column; align-items: center;
      gap: 8px; padding: 40px 20px; color: var(--muted);
      font-size: 13px; text-align: center;
    }
    .issues-empty-icon { font-size: 28px; }

    /* ── ISSUE CARD ──────────────────────────────────────────────── */
    .issue-card {
      border-radius: 8px; border: 1px solid var(--border);
      background: var(--card); overflow: hidden;
      transition: border-color .15s;
    }
    .issue-card:hover { border-color: var(--border-2); }
    .issue-card.error  { border-left: 3px solid var(--error); }
    .issue-card.warning{ border-left: 3px solid var(--warn); }
    .issue-card.info   { border-left: 3px solid var(--info); }
    .issue-card.done   { opacity: .5; }
    .issue-card-header {
      padding: 10px 12px 0;
      display: flex; align-items: flex-start; justify-content: space-between; gap: 8px;
    }
    .issue-card-title {
      font-size: 12px; font-weight: 500; color: var(--text);
      line-height: 1.35; flex: 1;
    }
    .issue-badge {
      font-size: 9px; font-weight: 500; font-family: ui-monospace, "SF Mono", monospace;
      padding: 2px 6px; border-radius: 3px; letter-spacing: .04em;
      text-transform: uppercase; white-space: nowrap; margin-top: 1px;
    }
    .badge-error   { background: var(--error-bg); color: var(--error); }
    .badge-warning { background: var(--warn-bg);  color: var(--warn); }
    .badge-ok      { background: var(--ok-bg);    color: var(--ok); }
    .badge-muted   { background: var(--card-2);   color: var(--muted); }
    .issue-card-desc {
      padding: 4px 12px 8px;
      font-size: 11.5px; color: var(--muted); line-height: 1.4;
    }
    .issue-card-value-wrap { padding: 0 12px 8px; }
    .issue-card-value-label {
      font-size: 10px; color: var(--muted); margin-bottom: 4px;
      letter-spacing: .04em; text-transform: uppercase;
    }
    .issue-value-display {
      font-family: ui-monospace, "SF Mono", monospace; font-size: 11px;
      background: var(--card-2); border: 1px solid var(--border);
      border-radius: 4px; padding: 6px 8px; color: var(--text);
      word-break: break-word; line-height: 1.4;
    }
    .issue-value-input {
      font-family: ui-monospace, "SF Mono", monospace; font-size: 11px;
      background: var(--bg); border: 1px solid var(--border-2);
      border-radius: 4px; padding: 6px 8px; color: var(--text);
      width: 100%; outline: none; resize: vertical; min-height: 36px;
      line-height: 1.4;
    }
    .issue-value-input:focus { border-color: rgba(255,255,255,0.3); }
    .issue-card-actions {
      display: flex; gap: 6px; padding: 0 12px 10px; flex-wrap: wrap;
    }
    .action-btn {
      padding: 5px 10px; border-radius: 5px; font-size: 11px;
      font-family: inherit; cursor: pointer; border: 1px solid var(--border);
      font-weight: 500; transition: all .12s;
    }
    .action-btn:disabled { opacity: .35; cursor: not-allowed; }
    .action-btn.accept {
      background: transparent; color: var(--ok); border-color: rgba(58,158,110,.35);
    }
    .action-btn.accept:hover:not(:disabled) { background: var(--ok-bg); }
    .action-btn.edit {
      background: transparent; color: var(--muted); border-color: var(--border-2);
    }
    .action-btn.edit:hover:not(:disabled) { color: var(--text); border-color: rgba(255,255,255,.22); }
    .action-btn.skip {
      background: transparent; color: var(--muted); border-color: transparent;
    }
    .action-btn.skip:hover:not(:disabled) { color: var(--text); }
    .action-btn.confirm {
      background: var(--text); color: #000; border-color: var(--text); font-weight: 500;
    }
    .action-btn.confirm:hover:not(:disabled) { opacity: .85; }
    .action-btn.cancel {
      background: transparent; color: var(--muted); border-color: transparent;
    }
    .action-btn.human {
      background: transparent; color: var(--muted); border-color: var(--border-2);
    }
    .action-btn.human:hover:not(:disabled) { color: var(--text); border-color: rgba(255,255,255,.22); }

    /* ── UPLOAD ZONE ─────────────────────────────────────────────── */
    .upload-screen {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 40px 24px; gap: 24px; overflow-y: auto;
    }
    .upload-zone {
      width: 100%; max-width: 520px;
      border: 2px dashed var(--border);
      border-radius: 12px; padding: 48px 32px;
      display: flex; flex-direction: column; align-items: center; gap: 12px;
      cursor: pointer; transition: border-color .2s, background .2s;
      background: var(--surface); text-align: center;
    }
    .upload-zone.drag-over { border-color: rgba(255,255,255,0.3); background: rgba(255,255,255,0.03); }
    .upload-zone:hover { border-color: var(--border-2); }
    .upload-icon { font-size: 28px; }
    .upload-title {
      font-size: 16px; font-weight: 500;
      color: var(--text); letter-spacing: -0.01em;
    }
    .upload-sub { font-size: 12px; color: var(--muted); }
    .upload-btn {
      margin-top: 4px; padding: 7px 18px; border-radius: 5px;
      background: var(--text); color: #000; border: none;
      font-family: inherit; font-size: 12px; font-weight: 500;
      cursor: pointer; transition: opacity .15s;
    }
    .upload-btn:hover { opacity: .85; }

    /* ── SETTINGS PANEL (below upload zone) ──────────────────────── */
    .settings-inline {
      width: 100%; max-width: 520px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px; overflow: hidden;
    }
    .settings-inline-header {
      padding: 14px 18px;
      font-size: 12px; font-weight: 600; color: var(--muted);
      letter-spacing: .06em; text-transform: uppercase;
      border-bottom: 1px solid var(--border);
    }
    .settings-group { padding: 10px 0; }
    .settings-group-label {
      padding: 4px 18px 8px;
      font-size: 10px; font-weight: 600; color: var(--muted);
      letter-spacing: .08em; text-transform: uppercase;
    }
    .settings-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 7px 18px; gap: 12px;
    }
    .settings-row-label { font-size: 12.5px; color: var(--text); flex: 1; }
    .settings-row-tag {
      font-size: 9px; font-family: ui-monospace, "SF Mono", monospace;
      padding: 2px 6px; border-radius: 3px;
      letter-spacing: .04em; text-transform: uppercase;
    }
    .tag-auto   { background: var(--ok-bg);   color: var(--ok); }
    .tag-human  { background: var(--warn-bg); color: var(--warn); }
    .toggle {
      position: relative; width: 28px; height: 16px; flex-shrink: 0;
    }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-slider {
      position: absolute; inset: 0;
      background: rgba(255,255,255,0.15); border-radius: 8px;
      cursor: pointer; transition: background .2s;
    }
    .toggle-slider::before {
      content: ''; position: absolute;
      width: 10px; height: 10px; left: 3px; bottom: 3px;
      border-radius: 50%; background: rgba(255,255,255,0.5);
      transition: transform .2s, background .2s;
    }
    .toggle input:checked + .toggle-slider { background: rgba(255,255,255,0.85); }
    .toggle input:checked + .toggle-slider::before { transform: translateX(12px); background: #000; }
    .toggle input:disabled + .toggle-slider { opacity: .3; cursor: default; }

    /* ── API KEY INPUT ────────────────────────────────────────────── */
    .api-key-wrap {
      width: 100%; max-width: 520px;
      background: var(--surface);
      border: 1px solid var(--border); border-radius: 12px;
      padding: 14px 18px; display: flex; flex-direction: column; gap: 8px;
    }
    .api-key-label {
      font-size: 11px; font-weight: 600; color: var(--muted);
      letter-spacing: .06em; text-transform: uppercase;
    }
    .api-key-input {
      background: var(--bg); border: 1px solid var(--border-2);
      border-radius: 5px; padding: 7px 10px;
      font-family: ui-monospace, "SF Mono", monospace; font-size: 12px; color: var(--text);
      width: 100%; outline: none; transition: border-color .15s;
    }
    .api-key-input:focus { border-color: rgba(255,255,255,0.3); }
    .api-key-hint { font-size: 11px; color: var(--muted); }

    /* ── MODAL ────────────────────────────────────────────────────── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.6);
      display: flex; align-items: center; justify-content: center;
      z-index: 100; padding: 20px;
    }
    .modal {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; width: 100%; max-width: 480px;
      max-height: 80vh; display: flex; flex-direction: column;
      overflow: hidden;
    }
    .modal-header {
      padding: 16px 20px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .modal-title { font-size: 14px; font-weight: 600; letter-spacing: -0.01em; }
    .modal-close {
      background: none; border: none; color: var(--muted); cursor: pointer;
      font-size: 20px; line-height: 1; padding: 2px;
    }
    .modal-close:hover { color: var(--text); }
    .modal-body { overflow-y: auto; flex: 1; }

    /* ── LOADING OVERLAY ─────────────────────────────────────────── */
    .loading-overlay {
      position: fixed; inset: 0;
      background: rgba(13,13,20,.85);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 16px; z-index: 200;
    }
    .loading-title {
      font-size: 14px; font-weight: 500; color: var(--text);
    }
    .loading-sub { font-size: 13px; color: var(--muted); }

    .tag-slide {
      display: inline-block; font-size: 10px; font-family: ui-monospace, "SF Mono", monospace;
      background: var(--card-2); color: var(--muted); padding: 1px 5px;
      border-radius: 3px; margin-bottom: 2px;
    }

    /* Filter chips */
    .filter-chips {
      display: flex; gap: 6px; padding: 10px 12px 0; flex-wrap: wrap;
    }
    .chip {
      padding: 3px 10px; border-radius: 12px; font-size: 11px;
      border: 1px solid var(--border); background: var(--card);
      cursor: pointer; color: var(--muted); transition: all .12s;
    }
    .chip.active { background: var(--accent-bg); border-color: rgba(124,106,245,.4); color: var(--accent); }

    /* ── TOAST NOTIFICATIONS ─────────────────────────────────────── */
    .toast-container {
      position: fixed; bottom: 20px; right: 20px;
      display: flex; flex-direction: column; gap: 8px;
      z-index: 300; pointer-events: none;
    }
    .toast {
      pointer-events: all;
      display: flex; align-items: flex-start; gap: 10px;
      padding: 11px 14px; border-radius: 8px;
      font-size: 13px; max-width: 360px; min-width: 220px;
      border: 1px solid var(--border);
      animation: toastIn .2s ease;
      box-shadow: 0 4px 20px rgba(0,0,0,.5);
    }
    @keyframes toastIn {
      from { transform: translateX(40px); opacity: 0; }
      to   { transform: translateX(0);    opacity: 1; }
    }
    .toast.error   { background: #1a1010; border-color: rgba(224,82,82,.3);  color: var(--error); }
    .toast.success { background: #0e1812; border-color: rgba(58,158,110,.3); color: var(--ok); }
    .toast.info    { background: var(--card); border-color: var(--border-2); color: var(--text); }
    .toast-msg { flex: 1; line-height: 1.4; }
    .toast-close {
      background: none; border: none; color: inherit; opacity: .5;
      cursor: pointer; font-size: 16px; padding: 0 2px; line-height: 1;
      flex-shrink: 0;
    }
    .toast-close:hover { opacity: 1; }

    /* ── BULK ACTION BAR ─────────────────────────────────────────── */
    .bulk-bar {
      padding: 7px 12px 0; display: flex; align-items: center;
      justify-content: space-between; gap: 8px;
    }
    .bulk-bar-label { font-size: 11px; color: var(--muted); }
    .bulk-btn {
      padding: 3px 10px; border-radius: 4px; font-size: 11px;
      border: 1px solid rgba(58,158,110,.3); background: transparent;
      color: var(--ok); cursor: pointer; font-family: inherit; font-weight: 500;
      transition: background .12s;
    }
    .bulk-btn:hover:not(:disabled) { background: var(--ok-bg); }
    .bulk-btn:disabled { opacity: .35; cursor: not-allowed; }

    /* ── SLIDE STRIP HEADER ──────────────────────────────────────── */
    .strip-header {
      padding: 8px 8px 4px;
      font-size: 10px; font-family: ui-monospace, "SF Mono", monospace; color: var(--muted);
      letter-spacing: .04em; text-transform: uppercase; text-align: center;
      border-bottom: 1px solid var(--border); margin-bottom: 4px;
    }

    /* ── LOADING STAGES ──────────────────────────────────────────── */
    .loading-stages {
      display: flex; flex-direction: column; gap: 6px; margin-top: 8px;
      max-width: 280px;
    }
    .loading-stage {
      display: flex; align-items: center; gap: 10px;
      font-size: 12px; color: var(--muted);
    }
    .loading-stage.active { color: var(--text); }
    .loading-stage.done   { color: var(--ok); }
    .stage-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--border); flex-shrink: 0;
    }
    .loading-stage.active .stage-dot { background: var(--accent); animation: pulse .8s infinite; }
    .loading-stage.done   .stage-dot { background: var(--ok); }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

// ── CONSTANTS ────────────────────────────────────────────────────────────────
const SEV_ORDER = { error: 0, warning: 1, info: 2 };
const CATEGORY_ORDER = ["Structure","Images","Tables","Content","Visual"];

// ── TOAST ────────────────────────────────────────────────────────────────────
function useToast() {
  const [toasts, setToasts] = useState([]);
  function toast(msg, type = "info") {
    const id = Date.now();
    setToasts(t => [...t, { id, msg, type }]);
    setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 4500);
  }
  function dismiss(id) { setToasts(t => t.filter(x => x.id !== id)); }
  return { toasts, toast, dismiss };
}

function ToastContainer({ toasts, dismiss }) {
  if (!toasts.length) return null;
  return (
    <div className="toast-container">
      {toasts.map(t => (
        <div key={t.id} className={`toast ${t.type}`}>
          <span className="toast-msg">{t.msg}</span>
          <button className="toast-close" onClick={() => dismiss(t.id)}>×</button>
        </div>
      ))}
    </div>
  );
}

// ── HELPERS ──────────────────────────────────────────────────────────────────
function severityBadge(sev) {
  if (sev === "error")   return <span className="issue-badge badge-error">Error</span>;
  if (sev === "warning") return <span className="issue-badge badge-warning">Warn</span>;
  return <span className="issue-badge badge-muted">Info</span>;
}

function statusBadge(status) {
  if (status === "auto_applied") return <span className="issue-badge badge-ok">Auto-fixed</span>;
  if (status === "accepted")     return <span className="issue-badge badge-ok">Accepted</span>;
  if (status === "edited")       return <span className="issue-badge badge-ok">Edited</span>;
  if (status === "skipped")      return <span className="issue-badge badge-muted">Skipped</span>;
  return null;
}

// ── ISSUE CARD ───────────────────────────────────────────────────────────────
function IssueCard({ issue, onAction, disabled }) {
  const [editing, setEditing] = useState(false);
  const [editVal, setEditVal] = useState(issue.suggested_value || "");
  const isDone   = ["auto_applied","accepted","edited","skipped"].includes(issue.status);
  const isHuman  = issue.always_human;
  const hasSuggestion = !!issue.suggested_value;

  const cardClass = ["issue-card", issue.severity, isDone ? "done" : ""].filter(Boolean).join(" ");

  function handleAccept() { onAction(issue.id, "accept"); }
  function handleEdit()   { setEditing(true); setEditVal(issue.suggested_value || ""); }
  function handleConfirm(){ onAction(issue.id, "edit", editVal); setEditing(false); }
  function handleCancel() { setEditing(false); }
  function handleSkip()   { onAction(issue.id, "skip"); }
  function handleHuman()  { onAction(issue.id, "accept"); }

  return (
    <div className={cardClass}>
      <div className="issue-card-header">
        <div style={{flex:1}}>
          {issue.slide_index >= 0 && (
            <div className="tag-slide">Slide {issue.slide_index + 1}</div>
          )}
          <div className="issue-card-title">{issue.title}</div>
        </div>
        <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:3}}>
          {isDone ? statusBadge(issue.status) : severityBadge(issue.severity)}
        </div>
      </div>

      <div className="issue-card-desc">{issue.description}</div>

      {hasSuggestion && !isDone && (
        <div className="issue-card-value-wrap">
          <div className="issue-card-value-label">
            {editing ? "Edit value" : "Suggested fix"}
          </div>
          {editing ? (
            <textarea
              className="issue-value-input"
              value={editVal}
              onChange={e => setEditVal(e.target.value)}
              rows={2}
              autoFocus
            />
          ) : (
            <div className="issue-value-display">{issue.suggested_value}</div>
          )}
        </div>
      )}

      {!isDone && (
        <div className="issue-card-actions">
          {isHuman ? (
            <button className="action-btn human" onClick={handleHuman} disabled={disabled}>
              ✓ Mark Reviewed
            </button>
          ) : editing ? (
            <>
              <button className="action-btn confirm" onClick={handleConfirm} disabled={disabled || !editVal.trim()}>
                Confirm
              </button>
              <button className="action-btn cancel" onClick={handleCancel} disabled={disabled}>
                Cancel
              </button>
            </>
          ) : (
            <>
              {hasSuggestion && (
                <button className="action-btn accept" onClick={handleAccept} disabled={disabled}>
                  ✓ Accept
                </button>
              )}
              <button className="action-btn edit" onClick={handleEdit} disabled={disabled}>
                ✎ Edit
              </button>
              <button className="action-btn skip" onClick={handleSkip} disabled={disabled}>
                Skip
              </button>
            </>
          )}
        </div>
      )}
    </div>
  );
}

// ── SETTINGS PANEL ───────────────────────────────────────────────────────────
function SettingsPanel({ checks, settings, onChange, isModal = false }) {
  const grouped = {};
  for (const [id, cfg] of Object.entries(checks)) {
    const cat = cfg.category || "Other";
    if (!grouped[cat]) grouped[cat] = [];
    grouped[cat].push({ id, ...cfg });
  }

  return (
    <div>
      {CATEGORY_ORDER.filter(c => grouped[c]).map(cat => (
        <div key={cat} className="settings-group">
          <div className="settings-group-label">{cat}</div>
          {grouped[cat].map(({ id, label, always_auto, always_human }) => (
            <div key={id} className="settings-row">
              <span className="settings-row-label">{label}</span>
              {always_auto  && <span className="settings-row-tag tag-auto">Always auto</span>}
              {always_human && <span className="settings-row-tag tag-human">Manual only</span>}
              {!always_auto && !always_human && (
                <label className="toggle">
                  <input
                    type="checkbox"
                    checked={settings[id] !== false}
                    onChange={e => onChange(id, e.target.checked)}
                  />
                  <span className="toggle-slider" />
                </label>
              )}
            </div>
          ))}
        </div>
      ))}
    </div>
  );
}

// ── SETTINGS MODAL ───────────────────────────────────────────────────────────
function SettingsModal({ checks, settings, onChange, onClose, sessionId }) {
  return (
    <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal">
        <div className="modal-header">
          <span className="modal-title">Autofix Settings</span>
          <button className="modal-close" onClick={onClose}>×</button>
        </div>
        <div className="modal-body">
          <SettingsPanel checks={checks} settings={settings} onChange={onChange} isModal />
        </div>
      </div>
    </div>
  );
}

// ── UPLOAD SCREEN ────────────────────────────────────────────────────────────
function UploadScreen({ onUpload }) {
  const [drag, setDrag]       = useState(false);
  const [settings, setSettings] = useState({});
  const [checks, setChecks]   = useState({});
  const [apiKey, setApiKey]   = useState("");
  const fileRef = useRef();

  useEffect(() => {
    fetch("/api/checks")
      .then(r => r.json())
      .then(data => {
        setChecks(data);
        const defaults = {};
        for (const [id, cfg] of Object.entries(data)) {
          if (!cfg.always_auto && !cfg.always_human) {
            defaults[id] = cfg.default_auto !== false;
          }
        }
        setSettings(defaults);
      });
  }, []);

  function handleFiles(files) {
    const f = [...files].find(f => f.name.toLowerCase().endsWith(".pptx"));
    if (f) onUpload(f, settings, apiKey);
  }

  return (
    <div className="upload-screen">
      <div
        className={`upload-zone ${drag ? "drag-over" : ""}`}
        onDragOver={e => { e.preventDefault(); setDrag(true); }}
        onDragLeave={() => setDrag(false)}
        onDrop={e => { e.preventDefault(); setDrag(false); handleFiles(e.dataTransfer.files); }}
        onClick={() => fileRef.current.click()}
      >
        <div className="upload-icon">↑</div>
        <div className="upload-title">Drop a .pptx file to begin</div>
        <div className="upload-sub">Drag & drop or click to browse</div>
        <button className="upload-btn" onClick={e => { e.stopPropagation(); fileRef.current.click(); }}>
          Choose File
        </button>
        <input
          ref={fileRef} type="file" accept=".pptx" style={{display:"none"}}
          onChange={e => handleFiles(e.target.files)}
        />
      </div>

      <div className="api-key-wrap">
        <div className="api-key-label">Anthropic API Key (optional — enables AI alt text &amp; titles)</div>
        <input
          className="api-key-input"
          type="password"
          placeholder="sk-ant-… (or set ANTHROPIC_API_KEY env var)"
          value={apiKey}
          onChange={e => setApiKey(e.target.value)}
        />
        <div className="api-key-hint">
          Without a key, AI-generated alt text and slide titles are skipped. All other checks still run.
        </div>
      </div>

      {Object.keys(checks).length > 0 && (
        <div className="settings-inline">
          <div className="settings-inline-header">Autofix Settings</div>
          <SettingsPanel
            checks={checks}
            settings={settings}
            onChange={(id, val) => setSettings(s => ({ ...s, [id]: val }))}
          />
        </div>
      )}
    </div>
  );
}

// ── ISSUES PANEL ─────────────────────────────────────────────────────────────
function IssuesPanel({ session, currentSlide, onAction, onAcceptAll, processing }) {
  const [tab, setTab]        = useState("pending");
  const [filter, setFilter]  = useState("all");

  const allPending  = session.issues.filter(i => i.status === "pending");
  const allFixed    = session.issues.filter(i => i.status === "auto_applied");
  const allResolved = session.issues.filter(i => ["accepted","edited","skipped"].includes(i.status));

  function filterIssues(list) {
    let out = list;
    if (filter === "slide") out = out.filter(i => i.slide_index === currentSlide);
    if (filter === "errors") out = out.filter(i => i.severity === "error");
    return out.sort((a,b) => (SEV_ORDER[a.severity]||9) - (SEV_ORDER[b.severity]||9));
  }

  const pending  = filterIssues(allPending);
  const fixed    = filterIssues(allFixed);
  const resolved = filterIssues(allResolved);

  const listToShow = tab === "pending" ? pending : tab === "fixed" ? fixed : resolved;

  // Issues that can be bulk-accepted (have a suggested value, not human-only)
  const acceptable = pending.filter(i => i.suggested_value && !i.always_human);

  return (
    <div className="issues-panel">
      <div className="issues-tabs">
        <div className={`issues-tab ${tab==="pending"?"active":""}`} onClick={() => setTab("pending")}>
          Pending ({allPending.length})
        </div>
        <div className={`issues-tab ${tab==="fixed"?"active":""}`} onClick={() => setTab("fixed")}>
          Auto-fixed ({allFixed.length})
        </div>
        <div className={`issues-tab ${tab==="resolved"?"active":""}`} onClick={() => setTab("resolved")}>
          Done ({allResolved.length})
        </div>
      </div>

      <div className="filter-chips">
        {[["all","All"],["slide","This slide"],["errors","Errors only"]].map(([v,l]) => (
          <span key={v} className={`chip ${filter===v?"active":""}`} onClick={() => setFilter(v)}>{l}</span>
        ))}
      </div>

      {tab === "pending" && acceptable.length > 1 && (
        <div className="bulk-bar">
          <span className="bulk-bar-label">{acceptable.length} auto-fixable</span>
          <button
            className="bulk-btn"
            disabled={!!processing}
            onClick={() => onAcceptAll(acceptable.map(i => i.id))}
          >
            ✓ Accept All
          </button>
        </div>
      )}

      <div className="issues-list">
        {listToShow.length === 0 ? (
          <div className="issues-empty">
            <div className="issues-empty-icon">
              {tab === "pending" ? "✅" : tab === "fixed" ? "🔧" : "📋"}
            </div>
            <div>
              {tab === "pending"
                ? filter === "slide"
                  ? "No pending issues on this slide"
                  : "No pending issues — great work!"
                : tab === "fixed"
                  ? "No auto-fixes were applied"
                  : "Nothing resolved yet"}
            </div>
          </div>
        ) : (
          listToShow.map(issue => (
            <IssueCard
              key={issue.id}
              issue={issue}
              onAction={onAction}
              disabled={!!processing}
            />
          ))
        )}
      </div>
    </div>
  );
}

// ── MAIN APP ─────────────────────────────────────────────────────────────────
function App() {
  const [session, setSession]           = useState(null);
  const [currentSlide, setCurrentSlide] = useState(0);
  const [loading, setLoading]           = useState(false);
  const [loadingStage, setLoadingStage] = useState(0); // 0=idle,1=uploading,2=scanning,3=thumbnails
  const [processing, setProcessing]     = useState(null);
  const [showSettings, setShowSettings] = useState(false);
  const [thumbTs, setThumbTs]           = useState({});
  const [checks, setChecks]             = useState({});
  const [sessionSettings, setSessionSettings] = useState({});
  const { toasts, toast, dismiss }      = useToast();

  useEffect(() => {
    fetch("/api/checks").then(r => r.json()).then(setChecks).catch(() => {});
  }, []);

  // ── KEYBOARD NAVIGATION ───────────────────────────────────────────────────
  useEffect(() => {
    if (!session) return;
    function onKey(e) {
      if (e.target.tagName === "TEXTAREA" || e.target.tagName === "INPUT") return;
      if (e.key === "ArrowLeft" || e.key === "ArrowUp") {
        setCurrentSlide(s => Math.max(0, s - 1));
      } else if (e.key === "ArrowRight" || e.key === "ArrowDown") {
        setCurrentSlide(s => Math.min(session.slide_count - 1, s + 1));
      }
    }
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [session]);

  // ── UPLOAD ─────────────────────────────────────────────────────────────────
  async function handleUpload(file, settings, apiKey) {
    setLoading(true);
    setLoadingStage(1);

    const fd = new FormData();
    fd.append("file", file);
    fd.append("settings", JSON.stringify(settings));
    if (apiKey) fd.append("api_key", apiKey);

    // Simulate stage transitions for feedback during long LibreOffice run
    const t1 = setTimeout(() => setLoadingStage(2), 1200);
    const t2 = setTimeout(() => setLoadingStage(3), 4000);

    try {
      const res  = await fetch("/api/upload", { method:"POST", body: fd });
      clearTimeout(t1); clearTimeout(t2);
      if (!res.ok) {
        const text = await res.text();
        toast(`Upload error ${res.status}: ${text.slice(0,120)}`, "error");
        return;
      }
      const data = await res.json();
      if (data.error) { toast(data.error, "error"); return; }
      setSession(data);
      setSessionSettings(settings);
      setCurrentSlide(0);
      const pending = data.pending?.length ?? 0;
      const auto    = data.auto_applied?.length ?? 0;
      toast(`Scanned — ${auto} auto-fixed, ${pending} pending review`, "success");
    } catch(e) {
      toast("Upload failed: " + e.message, "error");
    } finally {
      clearTimeout(t1); clearTimeout(t2);
      setLoading(false);
      setLoadingStage(0);
    }
  }

  // ── APPLY SINGLE FIX ───────────────────────────────────────────────────────
  async function applyFix(issueId, action, value) {
    const res  = await fetch("/api/apply-fix", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ session_id: session.session_id, issue_id: issueId, action, value }),
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    return data;
  }

  async function handleAction(issueId, action, value) {
    setProcessing(issueId);
    try {
      const data = await applyFix(issueId, action, value);
      setSession(data.session);
      if (data.slide_index >= 0) {
        setThumbTs(t => ({ ...t, [data.slide_index]: Date.now() }));
      }
    } catch(e) {
      toast("Error applying fix: " + e.message, "error");
    } finally {
      setProcessing(null);
    }
  }

  // ── ACCEPT ALL VISIBLE ─────────────────────────────────────────────────────
  async function handleAcceptAll(issueIds) {
    setProcessing("__bulk__");
    let lastSession = session;
    const thumbUpdates = {};
    try {
      for (const id of issueIds) {
        const data = await applyFix(id, "accept", undefined);
        lastSession = data.session;
        if (data.slide_index >= 0) thumbUpdates[data.slide_index] = Date.now();
      }
      setSession(lastSession);
      setThumbTs(t => ({ ...t, ...thumbUpdates }));
      toast(`Accepted ${issueIds.length} fix${issueIds.length !== 1 ? "es" : ""}`, "success");
    } catch(e) {
      toast("Bulk accept error: " + e.message, "error");
      setSession(lastSession);
    } finally {
      setProcessing(null);
    }
  }

  // ── SETTINGS CHANGE ────────────────────────────────────────────────────────
  async function handleSettingsChange(id, val) {
    const next = { ...sessionSettings, [id]: val };
    setSessionSettings(next);
    if (session) {
      await fetch("/api/update-settings", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({ session_id: session.session_id, settings: next }),
      }).catch(() => {});
    }
  }

  // ── DERIVED ────────────────────────────────────────────────────────────────
  const totalIssues = session ? session.issues.length : 0;
  const resolved    = session ? session.issues.filter(i =>
    ["accepted","edited","skipped","auto_applied"].includes(i.status)).length : 0;
  const progressPct = totalIssues > 0 ? Math.round((resolved/totalIssues)*100) : 0;

  function thumbUrl(index) {
    if (!session) return null;
    const ts = thumbTs[index] || "";
    return `/api/thumbnail/${session.session_id}/${index}${ts ? "?t="+ts : ""}`;
  }

  // ── LOADING SCREEN ─────────────────────────────────────────────────────────
  const STAGES = [
    { label: "Uploading file" },
    { label: "Scanning for accessibility issues" },
    { label: "Generating slide thumbnails" },
  ];

  if (!session) {
    return (
      <div className="app">
        <div className="topbar">
          <div className="topbar-logo">Slide A11y</div>
        </div>
        {loading ? (
          <div className="loading-overlay">
            <div className="spinner" style={{width:40,height:40}} />
            <div className="loading-title">Processing…</div>
            <div className="loading-stages">
              {STAGES.map((s, i) => {
                const stageNum = i + 1;
                const cls = stageNum < loadingStage ? "done" : stageNum === loadingStage ? "active" : "";
                return (
                  <div key={i} className={`loading-stage ${cls}`}>
                    <div className="stage-dot" />
                    {stageNum < loadingStage ? "✓ " : ""}{s.label}
                  </div>
                );
              })}
            </div>
          </div>
        ) : (
          <UploadScreen onUpload={handleUpload} />
        )}
        <ToastContainer toasts={toasts} dismiss={dismiss} />
      </div>
    );
  }

  const currentThumb = thumbUrl(currentSlide);
  const slideIssueCount = session.issues.filter(
    i => i.slide_index === currentSlide && i.status === "pending"
  ).length;

  return (
    <div className="app">
      {/* TOP BAR */}
      <div className="topbar">
        <div className="topbar-logo">⚡ Slide A11y</div>
        <div className="topbar-sep" />
        <div className="topbar-filename">{session.filename}</div>
        {session.ai_enabled && (
          <span style={{fontSize:10,color:"var(--ok)",fontFamily:"ui-monospace,monospace",
            background:"var(--ok-bg)",padding:"2px 7px",borderRadius:3}}>AI</span>
        )}
        <div className="topbar-progress">
          <span>{resolved}/{totalIssues} issues</span>
          <div className="progress-bar-wrap">
            <div className="progress-bar-fill" style={{width: progressPct+"%"}} />
          </div>
          <span>{progressPct}%</span>
        </div>
        <button className="topbar-btn" onClick={() => setShowSettings(true)}>⚙ Settings</button>
        <button className="topbar-btn" onClick={() => { setSession(null); setCurrentSlide(0); setThumbTs({}); }}>
          New File
        </button>
        <a href={`/api/download/${session.session_id}`}>
          <button className="topbar-btn primary">↓ Download</button>
        </a>
      </div>

      {/* MAIN WORKSPACE */}
      <div className="workspace">

        {/* SLIDE STRIP */}
        <div className="slide-strip">
          <div className="strip-header">{session.slide_count} slides</div>
          {session.slides.map((slide, idx) => {
            const pendingCount = session.issues.filter(
              i => i.slide_index === idx && i.status === "pending"
            ).length;
            return (
              <div
                key={idx}
                className={`slide-thumb ${currentSlide === idx ? "active" : ""}`}
                onClick={() => setCurrentSlide(idx)}
              >
                <img
                  src={thumbUrl(idx)}
                  alt={`Slide ${idx+1}`}
                  onError={e => {
                    e.target.style.display = "none";
                    e.target.nextSibling && (e.target.nextSibling.style.display = "flex");
                  }}
                />
                <div className="slide-thumb-placeholder" style={{display:"none"}}>{idx+1}</div>
                <div className="slide-thumb-num">{idx+1}</div>
                {pendingCount > 0 && (
                  <div className="slide-thumb-badge">{pendingCount}</div>
                )}
              </div>
            );
          })}
        </div>

        {/* SLIDE PREVIEW */}
        <div className="slide-preview">
          {processing ? (
            <div className="preview-loading">
              <div className="spinner" />
              <span>{processing === "__bulk__" ? "Applying fixes…" : "Applying fix…"}</span>
            </div>
          ) : (
            <>
              <img
                src={currentThumb}
                alt={`Slide ${currentSlide+1}`}
                key={currentThumb}
                style={{transition:"opacity .2s"}}
              />
              <div className="slide-preview-label">
                Slide {currentSlide+1} of {session.slide_count}
                {slideIssueCount > 0 && (
                  <span style={{color:"var(--warn)",marginLeft:8}}>
                    ⚠ {slideIssueCount} pending
                  </span>
                )}
                <span style={{color:"var(--muted)",marginLeft:12,fontSize:10}}>
                  ← → to navigate
                </span>
              </div>
            </>
          )}
        </div>

        {/* ISSUES PANEL */}
        <IssuesPanel
          session={session}
          currentSlide={currentSlide}
          onAction={handleAction}
          onAcceptAll={handleAcceptAll}
          processing={processing}
        />
      </div>

      {/* SETTINGS MODAL */}
      {showSettings && (
        <SettingsModal
          checks={checks}
          settings={sessionSettings}
          onChange={handleSettingsChange}
          onClose={() => setShowSettings(false)}
          sessionId={session?.session_id}
        />
      )}

      <ToastContainer toasts={toasts} dismiss={dismiss} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
